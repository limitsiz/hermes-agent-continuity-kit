  archive_sha256: "<ARCHIVE_SHA256_PLACEHOLDER>"
  manifest_sha256: "<MANIFEST_SHA256_PLACEHOLDER>"
  verification_status: "<VERIFICATION_STATUS>"
  verified_at_utc: "<VERIFIED_AT_UTC>"

approval_gates:
  scope_approved: "<YES_OR_NO>"
