schema_version: "<SCHEMA_VERSION>"

archive_batch:
  batch_id: "<ARCHIVE_BATCH_ID>"
  created_at_utc: "<CREATED_AT_UTC>"
  created_by_role: "<CREATED_BY_ROLE>"
  description: "<SAFE_BATCH_DESCRIPTION>"

source_scope:
  source_type: "<SOURCE_TYPE>"
  source_label: "<GENERIC_SOURCE_LABEL>"
  scope_id: "<SCOPE_ID>"
  metadata_only_scope_description: "<METADATA_ONLY_SCOPE_DESCRIPTION>"

cursor_range:
  previous_cursor: "<PREVIOUS_CURSOR>"
  start_cursor: "<START_CURSOR>"
  end_cursor: "<END_CURSOR>"
  cursor_semantics: "<CURSOR_SEMANTICS>"

artifacts:
  encrypted_archive_ref: "<ENCRYPTED_ARCHIVE_PLACEHOLDER_REF>"
  manifest_ref: "<MANIFEST_PLACEHOLDER_REF>"
  chunk_count: "<CHUNK_COUNT>"
  compression_method: "<COMPRESSION_METHOD>"
  encryption_method: "<ENCRYPTION_METHOD>"

