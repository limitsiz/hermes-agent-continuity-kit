  review_cursor_after: "<REVIEW_CURSOR_AFTER>"

recovery_linkage:
  checkpoint_cursor_before: "<CHECKPOINT_CURSOR_BEFORE>"
  checkpoint_cursor_after: "<CHECKPOINT_CURSOR_AFTER>"
